<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>양숙비 몰래 계화탕 버리기!</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Malgun Gothic', serif; }
        #game-container { position: relative; width: 800px; height: 600px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.7); }
.screen { position: absolute; width: 100%; height: 100%; display: none; background-size: cover; background-position: center; flex-direction: column; justify-content:flex-end; padding-bottom: 40px; align-items: center; }
        /* [수정] 이미지 속 선택지 느낌의 고급스러운 버튼/박스 스타일 */
        .btn { 
    padding: 15px 50px; 
    font-size: 26px; 
    font-weight: bold; 
    color: #eecf87; 
    background: rgba(40, 20, 10, 0.85);
    border: none; /* 기존 border 제거 */
    cursor: pointer; 
    transition: 0.3s;
    text-shadow: 1px 1px 2px #000;
    
    /* 1. 좌우 삼각형 모양 만들기 */
    clip-path: polygon(20px 0%, 100% 0%, calc(100% - 20px) 50%, 100% 100%, 20px 100%, 0% 50%);
    
    /* 2. 테두리 효과: drop-shadow는 모양을 따라 테두리를 만듭니다 */
    filter: drop-shadow(2px 0 0 #b8860b) drop-shadow(-2px 0 0 #b8860b) drop-shadow(0 2px 0 #b8860b) drop-shadow(0 -2px 0 #b8860b);
    
    /* 3. 그림자 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.btn:hover { 
    background: rgba(60, 30, 15, 0.95); 
    filter: drop-shadow(2px 0 0 #fff) drop-shadow(-2px 0 0 #fff) drop-shadow(0 2px 0 #fff) drop-shadow(0 -2px 0 #fff);
    transform: scale(1.05); 
}

        /* 영화 자막 스타일 자막 */
        #subtitle {
            position: absolute; 
            top: 50px; /* 화면 상단에서 50px 아래로 배치 */
            width: 80%;
            color: #fff; 
            font-size: 24px; 
            text-shadow: 0px 0px 0px #000;
            font-family: 'Batang', 'Nanum Myeongjo', 'AppleMyungjo', serif; /* 궁서체 우선 적용 */
            text-align: center; 
            padding: 15px;
            background: rgba(0, 0, 0, 0.2); 
            pointer-events: none;
            z-index: 100; /* 다른 요소보다 위에 오도록 설정 */
        }

        #score-box { 
            position: absolute; top: 30px; right: 30px; 
            background: rgba(40, 20, 10, 0.8); padding: 15px 25px; 
            border: 1px solid #b8860b; border-radius: 20px; 
            font-size: 22px; z-index: 10; color: #eecf87;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="screen" style="display: flex; background-image: url('start.PNG');">
            <div id="subtitle"></div> <button id="start-btn" class="btn" style="display: none;">계화탕을 받는 척한다</button>
        </div>
        <div id="main-screen" class="screen">
            <div id="score-box">Score: <span id="score">0</span> / 100</div>
        </div>
        <div id="success-screen" class="screen" style="background-image: url('success.jpeg');">
            <button onclick="location.reload()" class="btn">다시하기</button>
        </div>
        <div id="caught-screen" class="screen" style="background-image: url('caught.jpeg');">
            <button onclick="location.reload()" class="btn">다시하기</button>
        </div>
    </div>

    <script>


        // --- 1. 이미지 미리 로딩 (핵심) ---

        const imageFiles = ['center.png', 'left.png', 'right.png', 'key_l.png', 'key_r.png', 'start.PNG', 'success.jpeg', 'caught.jpeg'];

        const preloadedImages = {};

        let loadedCount = 0;



        // --- 1. 이미지 미리 로딩 부분 수정 ---
imageFiles.forEach(src => {
    const img = new Image();
    img.src = src;
    img.onload = () => {
        loadedCount++;
        // 모든 이미지가 로드되면 타이핑 시작 함수 호출
        if (loadedCount === imageFiles.length) {
            startSequence(); 
        }
    };
    preloadedImages[src] = img;
});

// --- 2. startSequence 함수 내 버튼 텍스트 설정 ---
function startSequence() {
    const subtitle = document.getElementById('subtitle');
    const startBtn = document.getElementById('start-btn');
    const text = "이모인 양숙비가 준 계화탕이 수상하다고 느낀 당신은...";
    
    startBtn.textContent = "계화탕을 받는 척한다"; // 버튼 텍스트 명시
    
    let i = 0;
    function type() {
        if (i < text.length) {
            subtitle.textContent += text.charAt(i);
            i++;
            setTimeout(type, 100);
        } else {
            startBtn.style.display = "block"; // 타이핑 완료 후 버튼 표시
        }
    }
    type();
}



        // --- 2. 게임 변수 ---

        let score = 0, isGameOver = false, currentState = 'center';

        const mainScreen = document.getElementById('main-screen');



        document.getElementById('start-btn').addEventListener('click', () => {

            if (loadedCount < imageFiles.length) return;

            document.getElementById('start-screen').style.display = 'none';

            mainScreen.style.display = 'flex';

            updateDisplay('center');

            planNextStateChange();

        });



        // --- 3. 이미지 즉시 전환 함수 ---

        function updateDisplay(key) {

            // 미리 로딩된 객체의 src를 가져와서 즉시 교체

            mainScreen.style.backgroundImage = `url('${preloadedImages[key + '.png'] ? key + '.png' : key + '.jpeg'}')`;

            document.getElementById('score').textContent = score;

        }



        // --- 4. 시선 변경 및 입력 처리 ---

        function changeState() {

            if (isGameOver) return;

            currentState = (currentState === 'left' || currentState === 'right') ? 'center' : (Math.random() < 0.5 ? 'left' : 'right');

            updateDisplay(currentState);

            planNextStateChange();

        }



        function planNextStateChange() {

            // 10점마다 단계가 오름 (0점: 0단계, 10점: 1단계, 20점: 2단계...)

            const stage = Math.floor(score / 10);

            

            // 각 단계마다 대기 시간을 150ms씩 줄임

            // 최소 시간(minDelay): 1500ms에서 시작해 500ms까지만 줄어듦

            // 최대 시간(maxDelay): 3000ms에서 시작해 1500ms까지만 줄어듦

            const reduction = stage * 150;

            

            const minDelay = Math.max(500, 1500 - reduction); 

            const maxDelay = Math.max(1500, 3000 - reduction); 

            

            const randomDelay = Math.floor(Math.random() * (maxDelay - minDelay)) + minDelay;

            

            // 타이머 설정

            setTimeout(changeState, randomDelay);

        }



        window.addEventListener('keydown', (e) => {

            if (isGameOver || mainScreen.style.display !== 'flex' || e.repeat) return;

            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {

                if (currentState === 'center') endGame(false);

                else if ((currentState === 'right' && e.key === 'ArrowLeft') || (currentState === 'left' && e.key === 'ArrowRight')) {

                    score++;

                    updateDisplay(currentState === 'right' ? 'key_l' : 'key_r');

                    if (score >= 100) endGame(true);

                } else endGame(false);

            }

        });



        window.addEventListener('keyup', (e) => {

            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') updateDisplay(currentState);

        });



        function endGame(isSuccess) {

            isGameOver = true;

            mainScreen.style.display = 'none';

            document.getElementById(isSuccess ? 'success-screen' : 'caught-screen').style.display = 'flex';

        }

    </script>

</body>

</html>
