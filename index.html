<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>양숙비 몰래 계화탕을 버리자!</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Malgun Gothic', serif; }
        #game-container { position: relative; width: 880px; height: 660px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.7);}
        .screen { position: absolute; width: 100%; height: 100%; display: none; background-size: cover; background-position: center; flex-direction: column; justify-content: center; padding-bottom: 0; align-items: center; }
        
        /* 버튼 컨테이너 */
        .btn-group { display: flex; gap: 200px; }
        
        .btn { 
            padding: 15px 50px; font-size: 26px; font-weight: bold; color: #eecf87; 
            background: rgba(40, 20, 10, 0.85); border: 2px solid #b8860b; border-radius: 15px; cursor: pointer; transition: 0.3s;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-family: 'Batang', 'Nanum Myeongjo', serif;
        }
        .btn:hover { background: rgba(60, 30, 15, 0.95); transform: scale(1.05); border-color: #fff; }
        .score-overlay {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    z-index: 200; /* 자막(100)보다 높게 설정 */
}
        #subtitle,#caught-subtitle,#success-subtitle { position: absolute; top: 50px; width: 80%; color: #fff; font-size: 24px; text-shadow: 2px 2px 4px #000; font-family: 'Batang', 'Nanum Myeongjo', serif; text-align: center; padding: 15px; background: rgba(0, 0, 0, 0.5); pointer-events: none; z-index: 100;line-height: 1.6; }
        #score-box { position: absolute; top: 30px; right: 30px; background: rgba(40, 20, 10, 0.8); padding: 15px 25px; border: 1px solid #b8860b; border-radius: 20px; font-family: 'Batang', 'Nanum Myeongjo', serif; font-size: 22px; z-index: 10; color: #eecf87; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="first-screen" class="screen" style="display: flex; background-image: url('first.png');">
            <button id="first-btn" class="btn" style="margin-top: 370px;">이야기 시작하기</button>
        </div>

        <div id="page-screen" class="screen" style="background-image: url('page.png');">
            <button id="back-btn" class="btn" style="margin-top: 500px;">돌아가기</button>
        </div>

        <div id="start-screen" class="screen" style="background-image: url('start.png');">
            <div id="subtitle"></div> 
            <div id="btn-container" class="btn-group" style="display: none;margin-top: 400px; ">
                <button id="info-btn" class="btn"style="margin-right: 80px;">잠시 고민한다</button>
                <button id="start-btn" class="btn" >계화탕을 받는 척한다</button>
            </div>
        </div>
        <div id="main-screen" class="screen">
            <div id="score-box">점수: <span id="score"> 0</span> / 100</div>
        </div>
        <div id="success-screen" class="screen" style="background-image: url('success.png');">
    <div id="success-subtitle"></div> 
    <div id="success-overlay" class="score-overlay">
        <div style="position: absolute; width: 100%; height: 100%; background-image: url('score.jpeg'); background-size: cover; background-position: center;"></div>
        <div style="position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: 260px;">
            <div id="final-score-success" style="font-size: 150px; color: #eecf87; font-weight: bold; margin-bottom: 50px; text-shadow: 2px 2px 10px #000;">100</div>
            <button onclick="restartGame()" class="btn">다시하기</button>
        </div>
    </div>
</div>

<div id="caught-screen" class="screen" style="background-image: url('caught.jpeg');">
    <div id="caught-subtitle"></div>
    <div id="score-overlay" class="score-overlay">
        <div style="position: absolute; width: 100%; height: 100%; background-image: url('score.jpeg'); background-size: cover; background-position: center;"></div>
        <div style="position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: 260px;">
            <div id="final-score" style="font-size: 150px; color: #eecf87; font-weight: bold; margin-bottom: 50px; text-shadow: 2px 2px 10px #000;">0</div>
            <button onclick="restartGame()" class="btn">다시하기</button>
        </div>
    </div>
</div>

    <button onclick="restartGame()" class="btn">다시하기</button>
</div>
    </div>

    <script>
        const imageFiles = ['first.png', 'page.png', 'center.png', 'left.png', 'right.png', 'key_l.png', 'key_r.png', 'start.png', 'success.png', 'caught.jpeg'];
        const preloadedImages = {};
        let loadedCount = 0;
        let score = 0, isGameOver = false, currentState = 'center', stateTimer = null;

        imageFiles.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = () => { loadedCount++; };
            preloadedImages[src] = img;
        });

        // 1단계 -> 2단계 이동
        document.getElementById('first-btn').addEventListener('click', () => {
            document.getElementById('first-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            startSequence();
        });
        // 설명 페이지 이동
        document.getElementById('info-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('page-screen').style.display = 'flex';
        });

        // 돌아가기 버튼
        document.getElementById('back-btn').addEventListener('click', () => {
            document.getElementById('page-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        });

        function startSequence() {
            const subtitle = document.getElementById('subtitle');
            const btnContainer = document.getElementById('btn-container');
            subtitle.textContent = "";
            const text = "이모인 양숙비가 준 계화탕이 수상하다고 느낀 당신은...";
            let i = 0;
            function type() {
                if (i < text.length) {
                    subtitle.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                } else {
                    btnContainer.style.display = "block";
                }
            }
            type();
        }

        // 2단계 -> 게임 시작 (중복 리스너 제거)
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            score = 0;
            isGameOver = false;
            currentState = 'center';
            updateDisplay('center');
            planNextStateChange();
        });

        function updateDisplay(key) {
            document.getElementById('main-screen').style.backgroundImage = `url('${preloadedImages[key + '.png'] ? key + '.png' : key + '.jpeg'}')`;
            document.getElementById('score').textContent = score;
        }

        function changeState() {
            if (isGameOver) return;
            currentState = (currentState === 'left' || currentState === 'right') ? 'center' : (Math.random() < 0.5 ? 'left' : 'right');
            updateDisplay(currentState);
            planNextStateChange();
        }

        function planNextStateChange() {
            if (stateTimer) clearTimeout(stateTimer);
            const stage = Math.floor(score / 10);
            const reduction = stage * 150;
            const minDelay = Math.max(800, 2000 - reduction); 
            const maxDelay = Math.max(2000, 3500 - reduction); 
            const randomDelay = Math.floor(Math.random() * (maxDelay - minDelay)) + minDelay;
            stateTimer = setTimeout(changeState, randomDelay);
        }

        window.addEventListener('keydown', (e) => {
            if (isGameOver || document.getElementById('main-screen').style.display !== 'flex' || e.repeat) return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                if (currentState === 'center') endGame(false);
                else if ((currentState === 'right' && e.key === 'ArrowLeft') || (currentState === 'left' && e.key === 'ArrowRight')) {
                    score++;
                    updateDisplay(currentState === 'right' ? 'key_l' : 'key_r');
                    if (score >= 100) endGame(true);
                } else endGame(false);
            }
        });

         window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') updateDisplay(currentState);
        });

        function endGame(isSuccess) {
    isGameOver = true;
    if (stateTimer) clearTimeout(stateTimer);
    document.getElementById('main-screen').style.display = 'none';

    const screen = isSuccess ? document.getElementById('success-screen') : document.getElementById('caught-screen');
    const subtitle = isSuccess ? document.getElementById('success-subtitle') : document.getElementById('caught-subtitle');
    const overlay = isSuccess ? document.getElementById('success-overlay') : document.getElementById('score-overlay');
    
    // 1. <br> 대신 | 기호 사용
    const rawText = isSuccess ? "오늘의 계화탕을 피한 당신은|스스로 이 궁중에서 살아남기로 결심했다..." : " 양숙비는 자신을 의심한 당신을 용서하지 않았다...";

    screen.style.display = 'flex';
    subtitle.innerHTML = ""; // 초기화
    overlay.style.display = 'none';
    overlay.style.opacity = '0';

    let i = 0;
    function type() {
        if (i < rawText.length) {
            // 2. 한 글자씩 추가하되, | 기호를 <br>로 즉시 변환하여 출력
            let currentDisplay = rawText.substring(0, i + 1);
            subtitle.innerHTML = currentDisplay.replace(/\|/g, '<br>');
            
            i++;
            setTimeout(type, 100);
        } else {
            setTimeout(() => {
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.opacity = '1'; }, 50);
            }, 1500);
        }
    }
    type();
}
        function restartGame() {
            document.getElementById('success-screen').style.display = 'none';
            document.getElementById('caught-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            startSequence();
        }
    </script>
</body>
</html>
