<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>양숙비 몰래 계화탕 버리기!</title>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        #game-container { position: relative; width: 800px; height: 600px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.7); }
        .screen { position: absolute; width: 100%; height: 100%; display: none; background-size: cover; background-position: center; flex-direction: column; justify-content: center; align-items: center; }
        
        /* 시작 및 결과 버튼 공통 스타일 */
        .btn { padding: 15px 40px; font-size: 24px; font-weight: bold; background-color: #b8860b; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .btn:hover { background-color: #daa520; transform: scale(1.05); }

        #score-box { position: absolute; top: 20px; right: 30px; background-color: rgba(0, 0, 0, 0.7); padding: 10px 20px; border-radius: 5px; font-size: 24px; z-index: 10; }
        #final-score { margin-bottom: 20px; font-size: 32px; color: #ff4d4d; background-color: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="screen" style="display: flex; background-image: url('start.jpeg');">
            <button id="start-btn" class="btn">게임 시작</button>
        </div>

        <div id="main-screen" class="screen">
            <div id="score-box">Score: <span id="score">0</span> / 100</div>
        </div>

        <div id="success-screen" class="screen" style="background-image: url('success.jpeg');">
            <button onclick="location.reload()" class="btn">다시하기</button>
        </div>

        <div id="caught-screen" class="screen" style="background-image: url('caught.jpeg');">
            <div id="final-score">최종 점수: <span id="result-score">0</span>점</div>
            <button onclick="location.reload()" class="btn">다시하기</button>
        </div>
    </div>

    <script>
        let score = 0, isGameOver = false, currentState = 'center', currentDisplay = 'center', stateTimer = null;
        const images = { 'center': 'center.png', 'left': 'left.png', 'right': 'right.png', 'key_l': 'key_l.png', 'key_r': 'key_r.png' };
        const startScreen = document.getElementById('start-screen'), mainScreen = document.getElementById('main-screen'), successScreen = document.getElementById('success-screen'), caughtScreen = document.getElementById('caught-screen');

        document.getElementById('start-btn').addEventListener('click', () => {
            startScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            updateDisplay();
            planNextStateChange();
        });

        function changeState() {
            if (isGameOver) return;
            currentState = (currentState === 'left' || currentState === 'right') ? 'center' : (Math.random() < 0.5 ? 'left' : 'right');
            currentDisplay = currentState;
            updateDisplay();
            planNextStateChange();
        }

        function planNextStateChange() {
            const delay = Math.floor(Math.random() * 1500) + 1500;
            clearTimeout(stateTimer);
            stateTimer = setTimeout(changeState, delay);
        }

        function updateDisplay() {
            mainScreen.style.backgroundImage = `url('${images[currentDisplay]}')`;
            document.getElementById('score').textContent = score;
        }

        window.addEventListener('keydown', (e) => {
            if (isGameOver || mainScreen.style.display !== 'flex') return;
            if (e.repeat) return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                if (currentState === 'center') endGame(false);
                else if ((currentState === 'right' && e.key === 'ArrowLeft') || (currentState === 'left' && e.key === 'ArrowRight')) {
                    score++;
                    currentDisplay = (currentState === 'right') ? 'key_l' : 'key_r';
                    if (score >= 100) endGame(true);
                } else endGame(false);
                updateDisplay();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') { currentDisplay = currentState; updateDisplay(); }
        });

        function endGame(isSuccess) {
            isGameOver = true;
            clearTimeout(stateTimer);
            mainScreen.style.display = 'none';
            if (isSuccess) successScreen.style.display = 'flex';
            else { caughtScreen.style.display = 'flex'; document.getElementById('result-score').textContent = score; }
        }
    </script>
</body>
</html>
